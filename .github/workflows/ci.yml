name: CI
on:
  pull_request:
    branches:
      - "*"
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
        continue-on-error: false

      - name: Build
        run: npm run build
        continue-on-error: false

      - name: Run tests
        run: npm test
        continue-on-error: false